name: iuea_library
description: IUEA Digital Library Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  http:                   ^1.2.0
  dio:                    ^5.4.0
  provider:               ^6.1.2
  shared_preferences:     ^2.2.3
  flutter_secure_storage: ^10.0.0
  flutter_dotenv: ^6.0.0
  go_router: ^17.2.1
  flutter_epub_viewer:    ^1.0.5
  just_audio: ^0.10.5
  audio_service:          ^0.18.14
  flutter_tts:            ^4.0.2
  google_sign_in: ^6.2.2
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^21.0.0
  cached_network_image:   ^3.3.1
  shimmer:                ^3.0.0
  lottie:                 ^3.1.0
  flutter_svg:            ^2.0.10+1
  percent_indicator:      ^4.2.3
  intl: ^0.20.2
  connectivity_plus: ^7.1.1
  path_provider:          ^2.1.3
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - .env
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: Lora
      fonts:
        - asset: assets/fonts/Lora-Regular.ttf
        - asset: assets/fonts/Lora-Bold.ttf
          weight: 700
    - family: Newsreader
      fonts:
        - asset: assets/fonts/Newsreader-Regular.ttf
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700

