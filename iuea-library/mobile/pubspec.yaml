name: iuea_library
description: IUEA Digital Library Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  http:                   ^1.2.0
  dio:                    ^5.4.0
  provider:               ^6.1.2
  shared_preferences:     ^2.2.3
  flutter_secure_storage: ^9.0.0
  flutter_dotenv:         ^5.1.0
  go_router:              ^13.2.0
  flutter_epub_viewer:    ^1.0.5
  just_audio:             ^0.9.40
  audio_service:          ^0.18.14
  flutter_tts:            ^4.0.2
  google_sign_in:         ^6.2.1
  firebase_core:          ^2.27.1
  firebase_messaging:     ^14.7.19
  cached_network_image:   ^3.3.1
  shimmer:                ^3.0.0
  lottie:                 ^3.1.0
  flutter_svg:            ^2.0.10+1
  percent_indicator:      ^4.2.3
  intl:                   ^0.19.0
  connectivity_plus:      ^5.0.2
  path_provider:          ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - .env
